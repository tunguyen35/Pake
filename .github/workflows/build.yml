name: Pake App Builder

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(github.event.client_payload.platforms) }}

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Đọc dữ liệu Payload đầu vào
        shell: bash
        run: |
          echo "BUILD_ID=${{ github.event.client_payload.build_id }}" >> $GITHUB_ENV
          echo "APP_URL=${{ github.event.client_payload.url }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.name }}" >> $GITHUB_ENV
          echo "APP_ICON=${{ github.event.client_payload.icon }}" >> $GITHUB_ENV
          echo "APP_WIDTH=${{ github.event.client_payload.width || 1200 }}" >> $GITHUB_ENV
          echo "APP_HEIGHT=${{ github.event.client_payload.height || 780 }}" >> $GITHUB_ENV

      # ─── Cài môi trường Rust ──────────────────────────────────────────────
      - name: Cài đặt Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # ─── Cài môi trường Node.js ───────────────────────────────────────────
      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─── Cài dependencies hệ thống cho Linux ──────────────────────────────
      - name: Cài thư viện hệ thống (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # ─── Cài pake-cli từ npm, build trực tiếp từ source repo đã fork ──────
      - name: Cài đặt pake-cli
        run: npm install -g pake-cli

      - name: Build App với Pake CLI
        shell: bash
        run: |
          ICON_ARG=""
          if [ -n "${{ env.APP_ICON }}" ]; then
            ICON_ARG="--icon ${{ env.APP_ICON }}"
          fi

          pake "${{ env.APP_URL }}" \
            --name "${{ env.APP_NAME }}" \
            --width ${{ env.APP_WIDTH }} \
            --height ${{ env.APP_HEIGHT }} \
            $ICON_ARG

      - name: Tìm file output
        id: find_file
        shell: bash
        run: |
          FILE=$(find . -maxdepth 2 -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "filename=$(basename "$FILE")" >> $GITHUB_OUTPUT
          echo "✅ File: $FILE"

      - name: Phát hành lên GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_ID }}
          name: "${{ env.APP_NAME }} (build ${{ env.BUILD_ID }})"
          files: ${{ steps.find_file.outputs.file }}
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Gửi phản hồi về Worker Webhook
        if: always()
        shell: bash
        run: |
          STATUS="${{ job.status }}"
          BASE_URL="${{ secrets.WORKER_CALLBACK_URL }}"
          BASE_URL="${BASE_URL%/}"
          DOWNLOAD_URL=""

          if [ "$STATUS" = "success" ] && [ -n "${{ steps.find_file.outputs.filename }}" ]; then
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/build-${{ env.BUILD_ID }}/${{ steps.find_file.outputs.filename }}"
          else
            STATUS="failed"
          fi

          curl -s -X POST "$BASE_URL" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d "{\"build_id\": \"${{ env.BUILD_ID }}\", \"status\": \"$STATUS\", \"os\": \"${{ matrix.os }}\", \"filename\": \"${{ steps.find_file.outputs.filename }}\", \"download_url\": \"$DOWNLOAD_URL\"}"

  notify_complete:
    name: Notify complete
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Báo hoàn thành về Worker
        shell: bash
        run: |
          curl -s -X POST "${{ secrets.WORKER_CALLBACK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d "{\"build_id\": \"${{ github.event.client_payload.build_id }}\", \"status\": \"all_done\", \"result\": \"${{ needs.build.result }}\"}"
