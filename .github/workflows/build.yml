name: Pake App Builder

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(github.event.client_payload.platforms) }}

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Đọc dữ liệu Payload đầu vào
        shell: bash
        run: |
          echo "BUILD_ID=${{ github.event.client_payload.build_id }}" >> $GITHUB_ENV
          echo "APP_URL=${{ github.event.client_payload.url }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.name }}" >> $GITHUB_ENV
          echo "APP_ICON=${{ github.event.client_payload.icon }}" >> $GITHUB_ENV
          echo "APP_WIDTH=${{ github.event.client_payload.width || 1200 }}" >> $GITHUB_ENV
          echo "APP_HEIGHT=${{ github.event.client_payload.height || 780 }}" >> $GITHUB_ENV

      # ─── Cài môi trường Rust & Cache (Ăn tiền ở đây) ──────────────────────
      - name: Cài đặt Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # Thêm cấu hình này để cache cả phần build của Pake CLI toàn diện hơn
          key: ${{ runner.os }}-pake-v1

      # ─── Cài môi trường Node.js & Cache npm ngon lành ─────────────────────
      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # Bật cache mặc định của setup-node

      # ─── Cài dependencies cho Linux (Dùng apt-fast nếu muốn nhanh hơn, hoặc tối ưu apt) ───
      - name: Cài thư viện hệ thống (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # ─── Mẹo tối ưu: Cài thẳng bằng npx thay vì cài Global ───────────────
      # Dùng npx thì GitHub Actions sẽ lôi từ bộ cache của npm ra chạy, đéo phải tải lại từ đầu nữa!
      - name: Build App với Pake CLI (Dùng NPX để ăn cache)
        shell: bash
        run: |
          ICON_ARG=""
          if [ -n "${{ env.APP_ICON }}" ]; then
            ICON_ARG="--icon ${{ env.APP_ICON }}"
          fi

          # Gọi thẳng qua npx để tận dụng cache npm của hệ thống
          npx --yes pake-cli "${{ env.APP_URL }}" \
            --name "${{ env.APP_NAME }}" \
            --width ${{ env.APP_WIDTH }} \
            --height ${{ env.APP_HEIGHT }} \
            $ICON_ARG

      - name: Tìm file output
        id: find_file
        shell: bash
        run: |
          echo "📂 Tìm tất cả file exe/msi/dmg/deb/AppImage:"
          FILE=$(find . -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null | grep -v "node_modules/.*\.exe$" | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "filename=$(basename "$FILE")" >> $GITHUB_OUTPUT
          echo "✅ File: $FILE"

      - name: Phát hành lên GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_ID }}
          name: "${{ env.APP_NAME }} (build ${{ env.BUILD_ID }})"
          files: ${{ steps.find_file.outputs.file }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Gửi phản hồi về Worker Webhook
        if: always()
        shell: bash
        run: |
          STATUS="${{ job.status }}"
          BASE_URL="${{ secrets.WORKER_CALLBACK_URL }}"
          BASE_URL="${BASE_URL%/}"
          DOWNLOAD_URL=""

          if [ "$STATUS" = "success" ] && [ -n "${{ steps.find_file.outputs.filename }}" ]; then
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/build-${{ env.BUILD_ID }}/${{ steps.find_file.outputs.filename }}"
          else
            STATUS="failed"
          fi

          curl -s -X POST "$BASE_URL" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d "{\"build_id\": \"${{ env.BUILD_ID }}\", \"status\": \"$STATUS\", \"os\": \"${{ matrix.os }}\", \"filename\": \"${{ steps.find_file.outputs.filename }}\", \"download_url\": \"$DOWNLOAD_URL\"}"

  notify_complete:
    name: Notify complete
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Báo hoàn thành về Worker
        shell: bash
        run: |
          curl -s -X POST "${{ secrets.WORKER_CALLBACK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ secrets.CALLBACK_SECRET }}" \
            -d "{\"build_id\": \"${{ github.event.client_payload.build_id }}\", \"status\": \"all_done\", \"result\": \"${{ needs.build.result }}\"}"
